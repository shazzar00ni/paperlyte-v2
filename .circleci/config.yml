version: 2.1

orbs:
  node: circleci/node@6.3.0
  browser-tools: circleci/browser-tools@1.4.8

executors:
  node-executor:
    docker:
      - image: cimg/node:22.14
    resource_class: medium

jobs:
  install:
    executor: node-executor
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  lint:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Format check
          command: npm run format:check

  typecheck:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: TypeScript type check
          command: npx tsc -b --noEmit

  test:
    executor: node-executor
    parallelism: 4
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Discover and run tests
          # circleci tests glob discovers all test files (the "discover command").
          # circleci tests run splits them across parallel nodes by historical
          # timing data and appends the file list to the vitest command.
          command: |
            mkdir -p test-results
            circleci tests glob "src/**/*.{test,spec}.{ts,tsx}" | \
              circleci tests run \
                --command="npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml" \
                --split-by=timings \
                --verbose
          environment:
            CI: "true"
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  coverage:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Coverage report
          command: npm run test:coverage
          environment:
            CI: "true"
      - store_artifacts:
          path: coverage
          destination: coverage

  build:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: dist
          destination: dist

  e2e:
    docker:
      - image: mcr.microsoft.com/playwright:v1.58.2-noble
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - attach_workspace:
          at: .
      - run:
          name: Start preview server
          command: |
            npx vite preview --host 0.0.0.0 --port 4173 &
            for i in {1..30}; do
              curl -fsS http://127.0.0.1:4173 >/dev/null && exit 0
              sleep 1
            done
            echo "Preview server did not start in time" >&2
            exit 1
      - run:
          name: E2E tests
          command: npm run test:e2e
          environment:
            CI: "true"
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_test_results:
          path: playwright-report

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires:
            - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install
      - coverage:
          requires:
            - install
      - build:
          requires:
            - lint
            - typecheck
            - test
            - coverage
      - e2e:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - /^claude\/.*/
