name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:
  Analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # allows SonarCloud to decorate PRs with analysis results

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection
          persist-credentials: false

      - name: Check SonarCloud configuration
        id: check-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_PROJECT_KEY" ] || [ -z "$SONAR_ORG" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::SonarCloud secrets/variables not configured. Skipping analysis."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Analyze with SonarCloud
        if: steps.check-config.outputs.configured == 'true'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey="${{ vars.SONAR_PROJECT_KEY }}"
            -Dsonar.organization="${{ vars.SONAR_ORGANIZATION }}"
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectBaseDir=.
