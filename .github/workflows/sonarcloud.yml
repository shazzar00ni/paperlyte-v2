name: SonarCloud analysis

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read # allows actions/checkout to fetch the repository
  pull-requests: write # allows SonarCloud to decorate PRs with analysis results

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Full history required for SonarCloud blame data and new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Analyze with SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # SHA for security
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Additional arguments for the SonarScanner CLI
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'shazzar00ni_paperlyte-v2' }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'shazzar00ni' }}
          # When you need the analysis to take place in a directory other than the one from which it was launched, default is .
          projectBaseDir: .
