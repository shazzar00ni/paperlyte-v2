sonar.projectKey=shazzar00ni_paperlyte-v2
sonar.organization=shazzar00ni

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report path (generated by vitest --coverage with lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files and non-source files from coverage analysis
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,src/test/**,src/vite-env.d.ts

# Exclude generated and config files from analysis
sonar.exclusions=node_modules/**,dist/**,coverage/**,public/**,scripts/**,**/*.d.ts,playwright-report/**,test-results/**
