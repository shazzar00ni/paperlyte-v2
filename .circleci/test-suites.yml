---
name: unit-tests

# Discover all unit test files managed by Vitest (honours vitest.config.ts
# include/exclude patterns).  The --filesOnly flag outputs one file path per
# line, giving CircleCI one "atom" per file for dynamic splitting.
discover: npx vitest list --filesOnly

# Run the atoms assigned to this node.  << test.atoms >> is substituted with
# the space-separated list of test files assigned by CircleCI's queue.
# NODE_OPTIONS and CI are inherited from the job step environment.
run: >-
  npx vitest run --reporter=default --reporter=junit
  "--outputFile.junit=<< outputs.junit >>" << test.atoms >>

# (Optional) Analysis command collects per-test code coverage so CircleCI
# can power Test Impact Analysis on future runs.  Requires the
# @circleci/vitest-circleci-coverage package (JSR: jsr:@circleci/vitest-circleci-coverage).
# Install it with:  npx jsr@latest add @circleci/vitest-circleci-coverage
# Then add runner/reporter to vitest.config.ts as described in the README,
# and uncomment the line below.
#
# analysis: CIRCLECI_COVERAGE="<< outputs.coverage >>" npx vitest run << test.atoms >>

outputs:
  junit: test-results/junit.xml
  # coverage: test-results/circleci-coverage.json  # uncomment with the analysis line

options:
  # Select only tests impacted by the current code changes (requires the
  # coverage map built by the analysis command above).
  adaptive-testing: true
  # Pull work from a shared queue rather than pre-dividing tests upfront,
  # keeping all parallel nodes busy even when test durations vary.
  dynamic-batching: true
  # Always run the full suite when these files change so timing data and
  # (once enabled) the coverage map remain accurate.
  full-test-run-paths:
    - package-lock.json
    - package.json
    - vite.config.ts
    - vitest.config.ts
    - .circleci/test-suites.yml
    - .circleci/config.yml
