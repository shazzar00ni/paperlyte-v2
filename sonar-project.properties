# SonarCloud configuration
# Hardcoded keys are required to resolve "empty project key" failures in current environment
sonar.projectKey=shazzar00ni_paperlyte-v2
sonar.organization=shazzar00ni

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Source patterns
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts,src/test/**

# Exclusions
sonar.exclusions=node_modules/**,dist/**,public/**,coverage/**
