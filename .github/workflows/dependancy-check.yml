name: Dependency Check
on: [push]
jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'paperlyte-v2'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired
