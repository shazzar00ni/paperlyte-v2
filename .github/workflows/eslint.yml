# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org
#
# Security note: This workflow intentionally uses the 'pull_request' event
# (not 'pull_request_target') so it runs with minimal permissions and can
# safely check out untrusted PR code.  SARIF upload to GHAS is handled by the
# companion 'ESLint Upload' workflow (eslint-upload.yml) which runs via
# 'workflow_run' in the privileged base-branch context without touching PR code.

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 15 * * 2'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write is intentionally absent here.
      # SARIF upload happens in the companion eslint-upload.yml workflow so
      # that untrusted PR code never runs in a privileged context.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install SARIF formatter
        run: npm install --no-save @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        id: eslint-run
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          npx eslint "src/**/*.{js,jsx,ts,tsx}" \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif \
            --max-warnings 0
        continue-on-error: true

      - name: Ensure SARIF file exists
        if: always()
        # Creates a minimal valid SARIF file if ESLint didn't produce one.
        # This can happen if ESLint fails before generating output.
        run: |
          if [ ! -f eslint-results.sarif ]; then
            cat > eslint-results.sarif << 'EOF'
            {
              "version": "2.1.0",
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "ESLint",
                      "informationUri": "https://eslint.org",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }
          EOF
          fi

      - name: Upload SARIF as workflow artifact
        # The SARIF file is uploaded as a workflow artifact so the companion
        # eslint-upload.yml workflow can pick it up and push it to GHAS without
        # running any PR code in a privileged context.
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: eslint-sarif
          path: eslint-results.sarif
          retention-days: 7

      - name: ESLint Summary
        if: always()
        run: |
          echo "## 🔍 ESLint Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.eslint-run.outcome }}" == "success" ]; then
            echo "✅ **ESLint:** No issues found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **ESLint:** Issues detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the **Security** tab for detailed findings." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "eslint-results.sarif" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📄 SARIF artifact uploaded for GHAS ingestion by eslint-upload.yml." >> $GITHUB_STEP_SUMMARY
          fi
