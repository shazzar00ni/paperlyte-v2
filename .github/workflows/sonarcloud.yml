name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:
  Analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # allows SonarCloud to decorate PRs with analysis results

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Download SonarScanner CLI
        run: |
          set -euo pipefail
          SONAR_VERSION="7.0.2.4839"
          SONAR_SHA256="ef72465a66f519e5da9f1d0731de073d35755a9893591cae4821faebb6e58dd8"
          SONAR_ARCHIVE="$RUNNER_TEMP/sonar-scanner.zip"
          SONAR_INSTALL_DIR="$RUNNER_TEMP/sonar-scanner"
          wget -q --timeout=60 --tries=3 "https://repo1.maven.org/maven2/org/sonarsource/scanner/cli/sonar-scanner-cli/${SONAR_VERSION}/sonar-scanner-cli-${SONAR_VERSION}.zip" -O "${SONAR_ARCHIVE}"
          echo "${SONAR_SHA256}  ${SONAR_ARCHIVE}" | sha256sum -c -
          unzip -q "${SONAR_ARCHIVE}" -d "${SONAR_INSTALL_DIR}"
          echo "${SONAR_INSTALL_DIR}/sonar-scanner-${SONAR_VERSION}/bin" >> $GITHUB_PATH

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORG}" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectBaseDir=.
