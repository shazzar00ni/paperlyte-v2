# CircleCI 2.1 pipeline for Paperlyte (React + TypeScript + Vite)
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# ─── Orbs ────────────────────────────────────────────────────────────────────
orbs:
  browser-tools: circleci/browser-tools@1.4.3

# ─── Executors ───────────────────────────────────────────────────────────────
executors:
  # Node 20 to match Netlify production (netlify.toml: NODE_VERSION="20")
  # and GitHub Actions CI (.github/workflows/ci.yml).
  node-executor:
    docker:
      - image: cimg/node:20.18
    resource_class: medium
  node-browsers-executor:
    docker:
      - image: cimg/node:20.18-browsers
    resource_class: medium
  playwright-executor:
    # NOTE: Keep this image tag in lockstep with the `@playwright/test` version
    # in package-lock.json. Mismatched versions cause browser-binary errors.
    docker:
      - image: mcr.microsoft.com/playwright:v1.58.2-noble
    resource_class: medium+
    environment:
      CI: "true"

# ─── Commands ────────────────────────────────────────────────────────────────
commands:
  restore-npm-cache:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-

  save-npm-cache:
    steps:
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  install-deps:
    steps:
      - restore-npm-cache
      - run:
          name: Install dependencies
          command: npm ci --prefer-offline
      - save-npm-cache

  attach-build:
    steps:
      - attach_workspace:
          at: .

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  # Install & cache node_modules, produce a shared workspace
  install:
    executor: node-executor
    steps:
      - checkout
      - install-deps
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  # Lint (ESLint + Prettier check) — runs in parallel with unit tests
  lint:
    executor: node-executor
    steps:
      - checkout
      - attach-build
      - run:
          name: Lint (ESLint)
          command: npm run lint
      - run:
          name: Format check (Prettier)
          command: npm run format:check

  # Unit tests with Vitest + coverage upload
  unit-tests:
    executor: node-executor
    steps:
      - checkout
      - attach-build
      - run:
          name: Run unit tests with coverage
          command: mkdir -p test-results && npm run test:coverage -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage
          destination: coverage

  # Production build — generates dist/ for downstream jobs
  build:
    executor: node-executor
    steps:
      - checkout
      - attach-build
      - run:
          name: Build (TypeScript + Vite)
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - dist

  # Bundle size check
  size-check:
    executor: node-browsers-executor
    steps:
      - checkout
      - attach-build
      - run:
          name: Bundle size check
          command: npm run size

  # Lighthouse CI — requires the production build
  lighthouse:
    executor: node-browsers-executor
    steps:
      - checkout
      - attach-build
      - run:
          name: Start preview server (background)
          command: npm run preview -- --port 4173
          background: true
      - browser-tools/install-chrome
      - run:
          name: Wait for preview server
          command: npx wait-on http://localhost:4173 --timeout 30000
      - run:
          name: Run Lighthouse CI
          command: npx lhci autorun
      - store_artifacts:
          path: .lighthouseci
          destination: lighthouse

  # E2E tests with Playwright (Chromium-only on CI for speed)
  e2e-tests:
    executor: playwright-executor
    parallelism: 2
    steps:
      - checkout
      - attach-build
      - restore-npm-cache
      - run:
          name: Install npm deps (in Playwright image)
          command: npm ci --prefer-offline
      - save-npm-cache
      - run:
          name: Start preview server (background)
          command: node_modules/.bin/vite preview --port 4173
          background: true
      - run:
          name: Wait for preview server
          command: npx wait-on http://localhost:4173 --timeout 30000
      - run:
          name: Run Playwright E2E tests
          command: |
            npx playwright test \
              --project=chromium \
              --shard=$((CIRCLE_NODE_INDEX + 1))/$CIRCLE_NODE_TOTAL
          environment:
            BASE_URL: "http://localhost:4173"
      - store_artifacts:
          path: playwright-report
          destination: playwright-report

# ─── Workflows ───────────────────────────────────────────────────────────────
workflows:
  ci:
    jobs:
      # Step 1 — dependency installation (shared workspace)
      - install

      # Step 2 — lint and unit tests run in parallel after install
      - lint:
          requires:
            - install
      - unit-tests:
          requires:
            - install

      # Step 3 — production build (requires clean lint + passing unit tests)
      - build:
          requires:
            - lint
            - unit-tests

      # Step 4 — post-build checks run in parallel
      - size-check:
          requires:
            - build
      - lighthouse:
          requires:
            - build
      - e2e-tests:
          requires:
            - build
