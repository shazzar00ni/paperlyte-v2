<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Paperlyte - Lightning-Fast, Distraction-Free Notes</title>
    <meta
      name="description"
      content="The fastest, simplest note-taking app. Capture ideas in milliseconds, organize with tags, and work offline across all your devices."
    />
    <meta name="keywords" content="__META_KEYWORDS__" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:title" content="Paperlyte - Lightning-Fast, Distraction-Free Notes" />
    <meta
      property="og:description"
      content="The fastest, simplest note-taking app. Capture ideas in milliseconds, organize with tags, and work offline across all your devices."
    />
    <meta property="og:image" content="__OG_IMAGE_URL__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="__SITE_URL__/" />
    <meta name="twitter:title" content="Paperlyte - Lightning-Fast, Distraction-Free Notes" />
    <meta
      name="twitter:description"
      content="The fastest, simplest note-taking app. Capture ideas in milliseconds, organize with tags, and work offline across all your devices."
    />
    <meta name="twitter:image" content="__OG_IMAGE_URL__" />
    <meta
      name="twitter:image:alt"
      content="Paperlyte app preview showing minimalist notes interface"
    />

    <!-- Favicons and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Persistent theme flag - read by public/theme-init.js before React hydrates.
         Injected at build time to avoid duplicating PERSISTENCE_CONFIG.ALLOW_PERSISTENT_THEME in HTML. -->
    <meta name="allow-persistent-theme" content="%VITE_ALLOW_PERSISTENT_THEME%" />

    <!-- Preload critical fonts to eliminate render-blocking FOUT -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Inter-Variable.woff2" crossorigin="anonymous" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/PlayfairDisplay-Variable.woff2" crossorigin="anonymous" />

    <!-- Preload critical above-the-fold hero image for better LCP -->
    <link rel="preload" as="image" type="image/avif" href="/mockups/notes-list.avif" imagesrcset="/mockups/notes-list-400w.avif 400w, /mockups/notes-list-800w.avif 800w, /mockups/notes-list.avif 1100w" imagesizes="(max-width: 480px) 85vw, 550px" />

    <!-- Theme initialization - loaded synchronously to prevent flash of wrong theme.
         Must run before React hydrates so the correct data-theme is applied immediately.
         Mirrors the logic in src/hooks/useTheme.ts. -->
    <script src="/theme-init.js"></script>
    <!-- Schema.org Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Paperlyte",
        "description": "Lightning-fast, distraction-free note-taking application with offline-first sync and tag-based organization",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": ["Windows", "macOS", "Linux", "iOS", "Android", "Web"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        },
        "url": "__SITE_URL__",
        "screenshot": "__OG_IMAGE_URL__",
        "featureList": [
          "Lightning-fast performance with instant startup",
          "Tag-based organization without rigid folder structures",
          "Offline-first functionality",
          "Real-time sync across all devices",
          "Privacy-focused with local-first data storage",
          "Distraction-free interface"
        ],
        "softwareVersion": "2.0.0",
        "author": {
          "@type": "Organization",
          "name": "Paperlyte",
          "url": "__SITE_URL__"
        }
      }
    </script>
  </head>
  <body>
    <!-- Skip to main content (accessibility) -->
    <a href="#main" class="skip-link">Skip to main content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
