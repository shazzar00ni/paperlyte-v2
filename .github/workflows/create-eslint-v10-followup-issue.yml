name: Create ESLint v10 Follow-up Issue

on:
  push:
    branches:
      - claude/eslint-10-upgrade-issue-Bg8XP

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create follow-up issue to track ESLint v10 upgrade
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_BODY_B64: ""
        run: |
          TITLE="chore: upgrade ESLint back to v10 once plugin support lands"

          EXISTING=$(gh issue list --repo "$GH_REPO" --state open --json title,number \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, skipping."
            exit 0
          fi

          echo "$ISSUE_BODY_B64" | base64 -d > /tmp/issue-body.md

          gh issue create \
            --repo "$GH_REPO" \
            --title "$TITLE" \
            --label "dependencies" \
            --body-file /tmp/issue-body.md
