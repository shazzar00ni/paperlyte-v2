name: Create ESLint v10 Follow-up Issue

on:
  push:
    branches:
      - claude/eslint-10-upgrade-issue-Bg8XP

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create follow-up issue to track ESLint v10 upgrade
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="chore: upgrade ESLint back to v10 once plugin support lands"

          # Check if the issue already exists
          EXISTING=$(gh issue list --repo "$GH_REPO" --search "$TITLE" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, skipping."
            exit 0
          fi

          gh issue create \
            --repo "$GH_REPO" \
            --title "$TITLE" \
            --label "dependencies" \
            --body "$(cat <<'BODY'
## Background

PR #485 proposes downgrading ESLint from v10 back to v9 due to peer dependency conflicts. The following plugins currently declare \`eslint ^9.0.0\` as a peer dependency and do not yet support ESLint 10:

| Plugin | Current Version | Peer Dep |
|---|---|---|
| \`eslint-plugin-react-hooks\` | \`^7.0.1\` | \`eslint ^9.0.0\` |
| \`typescript-eslint\` | \`^8.x\` | \`eslint ^9.0.0\` |

## Packages to Watch

- [ ] [\`eslint-plugin-react-hooks\`](https://www.npmjs.com/package/eslint-plugin-react-hooks) — watch for a release that adds \`eslint@^10\` to peer dependencies
- [ ] [\`typescript-eslint\`](https://typescript-eslint.io/) — watch for a v8.x patch or v9 release supporting ESLint 10

## Action Items

Once both plugins publish ESLint 10-compatible releases:

- [ ] Bump \`eslint\` and \`@eslint/js\` back to \`^10\`
- [ ] Verify no peer dependency warnings with \`npm install\`
- [ ] Run \`npm run lint\` and confirm no regressions
- [ ] Update \`CLAUDE.md\` tech stack section with the new ESLint version
- [ ] Close this issue and reference the upgrading PR

## References

- Downgrade PR: #485
- [ESLint v10 changelog](https://eslint.org/blog/2025/04/eslint-v10.0.0-released/)
- [typescript-eslint compatibility tracker](https://github.com/typescript-eslint/typescript-eslint/issues)
BODY
)"
