# SonarCloud analysis workflow.
# Prerequisites – configure these in your repository before enabling:
#   1. Create a project on https://sonarcloud.io and note the Project Key and Organization.
#   2. Add a SONAR_TOKEN secret (Settings > Secrets and variables > Actions > Secrets).
#   3. Add SONAR_PROJECT_KEY and SONAR_ORGANIZATION repository variables
#      (Settings > Secrets and variables > Actions > Variables) with the values from step 1.
# The job is automatically skipped when any required secret/variable is not configured.

name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Skip the job entirely when any required secret/variable is not configured so the
    # workflow does not fail on forks or repositories that have not set up SonarCloud.
    if: secrets.SONAR_TOKEN != '' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Disable shallow clones for better analysis relevancy
          fetch-depth: 0

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216 # v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          projectBaseDir: .
