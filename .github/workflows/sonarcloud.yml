name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read      # allows actions/checkout to fetch the repository
  pull-requests: write # allows SonarCloud to decorate PRs with analysis results

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Analysis:
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
