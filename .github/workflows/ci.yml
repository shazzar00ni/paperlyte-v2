name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  repository_dispatch:
    types: [run-ci]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch'
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # For repository_dispatch (weekly bot commits), check out the specific
          # bot commit SHA passed via client_payload rather than the default-branch
          # HEAD, which may have advanced by the time the event is processed.
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint

      - name: Run TypeScript type check
        id: typecheck
        run: npx tsc --noEmit

      - name: Check code formatting
        id: format
        run: npm run format:check

      - name: Run security audit
        id: audit
        run: npm audit --audit-level=high

      - name: Generate Lint Summary
        if: always()
        run: |
          echo "## 🔍 Lint & Type Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.eslint.outcome }}" == "success" ]; then
            echo "✅ **ESLint:** Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **ESLint:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.typecheck.outcome }}" == "success" ]; then
            echo "✅ **TypeScript:** No type errors" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **TypeScript:** Type errors found" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.format.outcome }}" == "success" ]; then
            echo "✅ **Prettier:** Code is formatted" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Prettier:** Formatting issues found" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.audit.outcome }}" == "success" ]; then
            echo "✅ **Security Audit:** No vulnerabilities" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Security Audit:** Vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        # Generate coverage even when tests fail to track coverage trends.
        # NODE_OPTIONS caps Node.js heap at 6 GB (ubuntu-latest has 7 GB total)
        # to prevent silent OOM kills from V8 coverage instrumentation with 77+
        # test files — an OOM kill produces zero output and no JUnit/coverage artifacts.
        # mkdir -p test-results ensures the JUnit output directory exists before
        # Vitest's reporter tries to write to it (Node fs.writeFile won't create
        # missing parent directories, so the report would be silently lost otherwise).
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          mkdir -p test-results
          npm run test:coverage -- --run --coverage.reportOnFailure

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "test-results/junit.xml"
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

      - name: Upload coverage to Codacy
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699  # v1.3.0
        env:
          # For repository_dispatch runs the Codacy reporter may fall back to
          # GITHUB_SHA (the default-branch HEAD at dispatch time) instead of the
          # checked-out commit. COMMIT_UUID overrides that so coverage is always
          # attributed to the correct bot commit SHA.
          COMMIT_UUID: ${{ github.event.client_payload.sha || github.sha }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/lcov.info

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build-step
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.build-step.outcome }}" == "success" ]; then
            echo "✅ **Build:** Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Build Output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh dist/ 2>/dev/null || echo "dist/ directory not found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            
            if [ -d "dist/assets" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Assets" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              ls -lh dist/assets/ | head -15
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Build:** Failed" >> $GITHUB_STEP_SUMMARY
          fi

  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Check bundle size
        id: size-limit
        run: |
          set -o pipefail
          npm run size 2>&1 | tee /tmp/size-output.txt

      - name: Post size report to PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.existsSync('/tmp/size-output.txt')
              ? fs.readFileSync('/tmp/size-output.txt', 'utf8').trim()
              : 'Size output not available.';
            const body = [
              '## \u{1F4E6} Bundle Size Report',
              '',
              '```',
              output,
              '```',
            ].join('\n');
            const marker = '## \u{1F4E6} Bundle Size Report';
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              }
            );
            const existing = comments.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );
            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Size report comment skipped: ${err.message}`);
            }

      - name: Bundle Size Summary
        if: always()
        run: |
          echo "## 📦 Bundle Size Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.size-limit.outcome }}" == "success" ]; then
            echo "✅ **Size Limit:** All bundles within budget" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Size Limit:** Some bundles exceed budget" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Show largest JS files
          find dist -name "*.js" -type f -exec ls -lh {} \; 2>/dev/null | sort -k5 -rh | head -5 || echo "No JS files found"
          echo '```' >> $GITHUB_STEP_SUMMARY

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Start preview server
        run: |
          npm run preview -- --host 0.0.0.0 --port 4173 &
          npx wait-on http://127.0.0.1:4173 --timeout 30000

      - name: Run Lighthouse CI
        id: lighthouse
        run: npx @lhci/cli@0.15.1 autorun --config=./.lighthouserc.json
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

      - name: Generate Lighthouse report summary
        if: always()
        run: bash .github/scripts/generate-lighthouse-summary.sh

      - name: Fail job if Lighthouse assertions failed
        if: steps.lighthouse.outcome == 'failure'
        run: exit 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.client_payload.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start preview server
        run: |
          npm run preview -- --host 0.0.0.0 --port 4173 &
          npx wait-on http://127.0.0.1:4173

      - name: Run Playwright tests
        id: playwright
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test-results/
          retention-days: 7

      - name: E2E Test Summary
        if: always()
        run: |
          echo "## 🎭 E2E Test Results (Playwright)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.playwright.outcome }}" == "success" ]; then
            echo "✅ **E2E Tests:** All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E Tests:** Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed test report in the \`playwright-report\` artifact." >> $GITHUB_STEP_SUMMARY

  add-to-project:
    name: Add To GitHub Projects
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Add To GitHub Projects
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        continue-on-error: true
        with:
          project-url: ${{ vars.PROJECT_URL || 'https://github.com/users/shazzar00ni/projects/19' }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

  # Status check job that all required jobs depend on
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build, size-check, lighthouse, e2e]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check all jobs status
        run: |
          # lint-and-typecheck and its dependents are skipped on repository_dispatch;
          # accept "skipped" as valid for those jobs, but test must always succeed.
          ok() { [ "$1" = "success" ] || [ "$1" = "skipped" ]; }
          LINT="${{ needs.lint-and-typecheck.result }}"
          TEST="${{ needs.test.result }}"
          BUILD="${{ needs.build.result }}"
          SIZE="${{ needs.size-check.result }}"
          LH="${{ needs.lighthouse.result }}"
          E2E="${{ needs.e2e.result }}"
          if ! ok "$LINT" || [ "$TEST" != "success" ] || ! ok "$BUILD" || ! ok "$SIZE" || ! ok "$LH" || ! ok "$E2E"; then
            echo "❌ CI Pipeline Failed"
            echo "- Lint & Type Check: $LINT"
            echo "- Tests: $TEST"
            echo "- Build: $BUILD"
            echo "- Bundle Size: $SIZE"
            echo "- Lighthouse: $LH"
            echo "- E2E Tests: $E2E"
            exit 1
          else
            echo "✅ All CI jobs passed successfully!"
            echo "- Lint & Type Check: $LINT"
            echo "- Tests: $TEST"
            echo "- Build: $BUILD"
            echo "- Bundle Size: $SIZE"
            echo "- Lighthouse: $LH"
            echo "- E2E Tests: $E2E"
          fi

      - name: CI Pipeline Summary
        if: always()
        run: |
          echo "## 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Function to convert result to emoji
          get_status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              cancelled) echo "⏹️ Cancelled" ;;
              skipped) echo "⏭️ Skipped" ;;
              *) echo "❓ Unknown" ;;
            esac
          }
          
          echo "| Lint & Type Check | $(get_status ${{ needs.lint-and-typecheck.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | $(get_status ${{ needs.test.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(get_status ${{ needs.build.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | $(get_status ${{ needs.size-check.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI | $(get_status ${{ needs.lighthouse.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | $(get_status ${{ needs.e2e.result }}) |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          ok() { [ "$1" = "success" ] || [ "$1" = "skipped" ]; }
          if ok "${{ needs.lint-and-typecheck.result }}" && \
             [ "${{ needs.test.result }}" = "success" ] && \
             ok "${{ needs.build.result }}" && \
             ok "${{ needs.size-check.result }}" && \
             ok "${{ needs.lighthouse.result }}" && \
             ok "${{ needs.e2e.result }}"; then
            echo "### ✅ All checks passed! Ready to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Some checks failed. Please review the issues above." >> $GITHUB_STEP_SUMMARY
          fi
