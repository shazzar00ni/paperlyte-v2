# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags (e.g., v1.0.0)

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      # contents: write - required to create the GitHub Release and upload assets
      # id-token: write - required for OIDC token used by cosign keyless signing
      contents: write
      id-token: write
    env:
      REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Full history for changelog
          persist-credentials: false

      - name: Validate ref name
        run: |
          if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Ref name '$REF_NAME' does not match the expected vX.Y.Z[-prerelease] format" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          # No cache: this release build signs artifacts, so it intentionally
          # avoids restoring a shared npm cache that could be poisoned.

      - name: Upgrade npm
        uses: ./.github/actions/upgrade-npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Create release archive
        run: |
          cd dist
          tar -czf "../paperlyte-${REF_NAME}.tar.gz" .
          cd ..

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@c9bcd8238b6f41e05561348339429d360b1c0247 # v6.2.3
        with:
          configuration: '.github/changelog-config.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifact
        run: |
          cosign sign-blob --yes \
            --bundle "paperlyte-${REF_NAME}.tar.gz.sigstore.json" \
            "paperlyte-${REF_NAME}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            paperlyte-${{ env.REF_NAME }}.tar.gz
            paperlyte-${{ env.REF_NAME }}.tar.gz.sigstore.json
          draft: false
          prerelease: ${{ contains(env.REF_NAME, 'alpha') || contains(env.REF_NAME, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
