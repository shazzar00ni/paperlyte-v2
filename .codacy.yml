---
# Coverage configuration for Codacy
coverage:
  paths:
    - coverage/lcov.info
  thresholds:
    overall: 70
    file: 70

# Global exclusions - Codacy should not even scan these
exclude_paths:
  - 'node_modules/**'
  - 'dist/**'
  - 'coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - 'src/test/**'
  - 'scripts/**'
  - '**/*.min.js'
  - '.github/workflows/sonarcloud.yml'
  - '.github/workflows/daily-pr-audit.yml'

engines:
  semgrep:
    enabled: true
  eslint-9:
    enabled: true
  eslint:
    enabled: false
  lizard:
    enabled: true
    exclude_paths:
      - '**/*.test.tsx'
      - '**/*.test.ts'
      - '**/*.spec.tsx'
      - '**/*.spec.ts'
  csslint:
    enabled: false
  stylelint:
    enabled: false
  jshint:
    enabled: false
  tslint:
    enabled: false
  trivy:
    enabled: false
  checkov:
    enabled: false
  hadolint:
    enabled: false
  shellcheck:
    enabled: true
  markdownlint:
    enabled: false
  pmd-legacy:
    enabled: false

exclude_patterns:
  - identifier: "Security/detect-non-literal-regexp"
    paths:
      - "src/utils/validation-utils.test.ts"
  - identifier: "generic.secrets.security.detected-sonarqube-api-token"
    paths:
      - ".github/workflows/sonarcloud.yml"
      - ".github/workflows/daily-pr-audit.yml"
