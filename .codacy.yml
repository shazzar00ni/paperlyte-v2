---
# Coverage configuration for Codacy
coverage:
  paths:
    - coverage/lcov.info
  thresholds:
    overall: 70
    file: 70

engines:
  semgrep:
    enabled: true
  eslint-9:
    enabled: true
  lizard:
    enabled: true
    exclude_paths:
      - '**/*.test.tsx'
      - '**/*.test.ts'
      - '**/*.spec.tsx'
      - '**/*.spec.ts'
  shellcheck:
    enabled: true

exclude_patterns:
  - identifier: "Security/detect-non-literal-regexp"
    paths:
      - "src/utils/validation-utils.test.ts"
  - identifier: "generic.secrets.security.detected-sonarqube-api-token"
    paths:
      - ".github/workflows/sonarcloud.yml"

exclude_paths:
  - 'node_modules/**'
  - 'dist/**'
  - 'coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - 'src/test/**'
  - 'scripts/**'
  - '**/*.min.js'
  - '.github/workflows/sonarcloud.yml'
