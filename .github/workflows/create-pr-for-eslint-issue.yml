name: Create PR for ESLint v10 Follow-up Issue

on:
  push:
    branches:
      - claude/eslint-10-upgrade-issue-Bg8XP

permissions:
  pull-requests: write
  contents: read

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_TITLE: "chore: open follow-up issue to track ESLint v10 upgrade (#525)"
          PR_BODY_B64: ""
        run: |
          echo "$PR_BODY_B64" | base64 -d > /tmp/pr-body.md

          EXISTING=$(gh pr list --repo "$GH_REPO" --state open --head claude/eslint-10-upgrade-issue-Bg8XP \
            --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR #$EXISTING"
            gh pr edit "$EXISTING" \
              --repo "$GH_REPO" \
              --title "$PR_TITLE" \
              --body-file /tmp/pr-body.md
          else
            echo "Creating new PR"
            gh pr create \
              --repo "$GH_REPO" \
              --base main \
              --head claude/eslint-10-upgrade-issue-Bg8XP \
              --title "$PR_TITLE" \
              --body-file /tmp/pr-body.md
          fi
