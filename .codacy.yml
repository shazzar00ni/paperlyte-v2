---
# Coverage configuration for Codacy
coverage:
  # Coverage report paths
  paths:
    - coverage/lcov.info

  # Coverage thresholds
  thresholds:
    overall: 70
    file: 70

engines:
  # --- Enabled engines (well under the 20-run SARIF limit) ---
  semgrep:
    enabled: true
  # eslint-9: authoritative ESLint engine
  eslint-9:
    enabled: true
  lizard:
    enabled: true
    exclude_paths:
      - '**/*.test.tsx'
      - '**/*.test.ts'
      - '**/*.spec.tsx'
      - '**/*.spec.ts'
  # Shell scripts exist
  shellcheck:
    enabled: true

# Exclude specific patterns in test files where they are false positives
exclude_patterns:
  - identifier: "Security/detect-non-literal-regexp"
    paths:
      - "src/utils/validation-utils.test.ts"
  - identifier: "generic.secrets.security.detected-sonarqube-api-token"
    paths:
      - ".github/workflows/sonarcloud.yml"

# Exclude paths from code analysis
exclude_paths:
  - 'node_modules/**'
  - 'dist/**'
  - 'coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - 'src/test/**'
  - 'scripts/**'
  - '**/*.min.js'
