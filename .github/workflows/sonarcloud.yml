name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:
  Analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # allows SonarCloud to decorate PRs with analysis results

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Analyze with SonarCloud
        # Skip gracefully when project key / org aren't configured (forks,
        # repositories that haven't set up SonarCloud).  An empty project key
        # causes the scanner to fail with a hard validation error, so we must
        # gate here rather than letting the scanner run.
        # On PRs and branch deploys this is advisory (continue-on-error);
        # pushes to main are the only hard gate.
        if: vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != ''
        id: sonar-analysis
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          projectBaseDir: .
