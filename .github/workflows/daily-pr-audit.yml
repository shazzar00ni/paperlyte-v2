name: Daily PR Audit

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: Audit Open PRs
    runs-on: ubuntu-latest
    if: github.repository_owner == 'shazzar00ni'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Branch Audit
        run: |
          python3 scripts/maintenance/audit_branches.py > audit_results.json

      - name: Generate Summary and Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/maintenance/generate_audit_summary.py

      - name: Commit Updated Summary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update daily PR review summary [skip ci]'
          file_pattern: PR_REVIEW_SUMMARY.md
