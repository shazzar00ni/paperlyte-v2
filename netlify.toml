# Netlify Configuration
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Base directory - explicitly set to repo root to override any UI settings
  # This prevents "invalid root directory 'backend'" errors
  base = "."

  # Build command
  command = "npm run build"

  # Directory with the build output (relative to repo root)
  publish = "dist"

  # Serverless functions directory
  functions = "netlify/functions"

  # Edge functions directory
  edge_functions = "netlify/edge-functions"

  # NPM_FLAGS="--include=dev" is passed to Netlify's automatic npm install so
  # that devDependencies (e.g. sharp, png-to-ico used by prebuild scripts) are
  # installed even when Netlify sets NODE_ENV=production. Avoids running a
  # second `npm ci` inside the build command, which would double install time.
  environment = { NODE_VERSION = "20.19.0", NPM_FLAGS = "--include=dev" }

# Production context: all deploys from the main branch
[context.production]
  command = "npm run build"
  publish = "dist"

# Deploy Preview context: all Deploy Previews from pull requests
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

# Branch Deploy context: all deploys from branches that aren't main
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

# WAF edge function — runs first on every request before the origin.
# It calls context.next() for clean requests, which invokes markdown-response
# (declared next) for / routes, then falls through to the origin.
# Both functions are declared here (TOML-only, no inline export const config) so
# Netlify's TOML-order guarantee makes WAF run before markdown-response.
[[edge_functions]]
  function = "waf"
  path = "/*"
  # Skip WAF on static assets served directly from the CDN cache.
  excludedPath = ["/assets/*", "/fonts/*", "/*.ico", "/*.png", "/*.jpg", "/*.jpeg", "/*.webp", "/*.avif", "/*.svg", "/*.gif"]

# Markdown edge function — serves /index.md for Accept: text/markdown requests to /
# Declared after WAF so all requests are screened by the WAF first.
[[edge_functions]]
  function = "markdown-response"
  path = "/"

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---------------------------------------------------------------------------
# Security headers — applied to all responses
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Strict Transport Security (2 years, include subdomains, preload-eligible)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Disable access to sensitive browser APIs
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), serial=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()"

    # Static fallback CSP — host-allowlist only, no nonce.
    # For HTML responses on non-excluded paths the WAF edge function (waf.ts)
    # overrides this with a stronger nonce-based CSP ('strict-dynamic' + per-
    # request nonce). This fallback applies to the edge cases where the WAF is
    # not invoked: paths excluded from the edge function (/assets/*, /fonts/*,
    # image types) that nonetheless resolve to index.html via the SPA rewrite
    # rule when no matching static file exists.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://plausible.io https://*.ingest.sentry.io; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"

    # Isolate this page's browsing context group so cross-origin windows opened
    # from this page (or that open this page) cannot access each other's DOM or
    # window object, mitigating Spectre-class side-channel attacks.
    Cross-Origin-Opener-Policy = "same-origin"

    # Prevent other origins from loading this site's resources
    Cross-Origin-Resource-Policy = "same-origin"

    # Cross-Origin-Embedder-Policy disabled to avoid blocking third-party analytics
    Cross-Origin-Embedder-Policy = "unsafe-none"

    # Block Adobe/Silverlight cross-domain policy files
    X-Permitted-Cross-Domain-Policies = "none"

    # Legacy XSS auditor (defence-in-depth for older browsers)
    X-XSS-Protection = "1; mode=block"

# Cache static assets for 1 year (content-addressed filenames ensure freshness)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache self-hosted fonts for 1 year
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent indexing of deploy previews and branch deploys
[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

# Performance optimizations
# Skip Netlify's build processing since Vite handles bundling and optimization
[build.processing]
  skip_processing = true
