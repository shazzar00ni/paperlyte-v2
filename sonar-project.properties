sonar.projectKey=shazzar00ni_paperlyte-v2
sonar.organization=shazzar00ni

sonar.projectName=paperlyte-v2
sonar.projectVersion=1.0.0

# Source directories (standard sources and maintenance scripts)
sonar.sources=src,scripts/maintenance

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# General exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.min.js,**/coverage/**,scripts/maintenance/__pycache__/**

# Coverage exclusions (maintenance scripts do not require unit test coverage)
sonar.coverage.exclusions=scripts/maintenance/**

# TypeScript/JavaScript specific
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
