# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '19 22 * * 5'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Execute Codacy Analysis CLI and generate a SARIF output with the security issues identified during the analysis.
      # upload: "false" prevents the action from auto-uploading the raw SARIF to Codacy at this point.
      # Codacy rejects uploads containing more than 20 runs; the raw output typically contains one run per
      # tool (23+). We merge all runs into one below and upload the merged file instead.
      - name: Run Codacy Analysis CLI
        id: codacy-run
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08  # v4.4.7
        with:
          # Check https://github.com/codacy/codacy-analysis-cli#project-token to get your project token from your Codacy repository
          # You can also omit the token and run the tools that support default configurations
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          output: results.sarif
          format: sarif
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647
          # Disable auto-upload: the raw SARIF contains >20 runs and Codacy rejects it.
          # The merged single-run file is uploaded in the step below instead.
          upload: "false"

      # Merge multiple SARIF runs into a single run to stay within GitHub Code Scanning's
      # 20-run limit per SARIF upload. Codacy generates one run per tool (23 tools = 23 runs).
      # We must merge before uploading, and only upload when merge succeeds.
      # See: https://github.blog/changelog/2025-07-21-code-scanning-will-stop-combining-multiple-sarif-runs-uploaded-in-the-same-sarif-file/
      - name: Merge SARIF runs into single run
        id: merge-sarif
        if: steps.codacy-run.conclusion == 'success'
        run: bash ./scripts/merge-sarif-runs.sh results.sarif

      # Upload the merged single-run SARIF to Codacy.
      # This replaces the auto-upload that was disabled above, ensuring Codacy receives results
      # while staying within its 20-run-per-upload limit.
      - name: Upload merged SARIF to Codacy
        if: steps.merge-sarif.conclusion == 'success'
        continue-on-error: true
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN not set, skipping Codacy upload"
            exit 0
          fi
          RUN_COUNT=$(jq '.runs | length' results.sarif)
          echo "SARIF run count before upload: $RUN_COUNT"
          if [ "$RUN_COUNT" -ne 1 ]; then
            echo "Error: expected exactly 1 run after merging, got $RUN_COUNT. Skipping Codacy upload to avoid rejection."
            exit 1
          fi
          ORG="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          COMMIT_UUID="${{ github.sha }}"
          echo "Uploading merged SARIF to Codacy..."
          HTTP_STATUS=""
          CURL_EXIT=0
          HTTP_STATUS=$(curl -sS \
            --connect-timeout 10 \
            --max-time 90 \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors \
            -o /tmp/codacy_upload_response.txt -w "%{http_code}" -X POST \
            "https://api.codacy.com/api/v3/analysis/organizations/gh/$ORG/repositories/$REPO/upload" \
            -H "api-token: $CODACY_PROJECT_TOKEN" \
            -F "commitUuid=$COMMIT_UUID" \
            -F "results=@results.sarif;type=application/json") || CURL_EXIT=$?
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "Error: curl failed while uploading SARIF to Codacy (exit code $CURL_EXIT)."
            if [ -n "$HTTP_STATUS" ]; then
              echo "Codacy upload HTTP status (if any): $HTTP_STATUS"
            fi
            echo "Codacy upload response (if any):"
            cat /tmp/codacy_upload_response.txt 2>/dev/null || true
            exit 0
          fi
          echo "Codacy upload HTTP status: $HTTP_STATUS"
          cat /tmp/codacy_upload_response.txt || true
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Codacy upload succeeded."
          else
            echo "Warning: Codacy upload returned HTTP $HTTP_STATUS"
          fi

      # Upload the SARIF file only after successful merge.
      # Using step outcome instead of hashFiles() ensures we never upload the
      # raw 23-run file when the merge step fails or is skipped.
      - name: Upload SARIF results file
        id: upload-sarif
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        if: steps.merge-sarif.conclusion == 'success'
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: codacy

      - name: Codacy Security Summary
        if: always()
        run: |
          echo "## 🔒 Codacy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.codacy-run.outcome }}" == "success" ]; then
            echo "✅ **Codacy Analysis:** Completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Codacy Analysis:** Issues detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.upload-sarif.outcome }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📄 SARIF results uploaded to GitHub Code Scanning." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.upload-sarif.outcome }}" == "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **SARIF upload failed.** Check the upload step logs for details." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge-sarif.conclusion }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **SARIF upload skipped** – merge step did not succeed." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed security findings in the **Security** tab." >> $GITHUB_STEP_SUMMARY
