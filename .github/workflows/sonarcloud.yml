name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read      # allows actions/checkout to fetch the repository
  pull-requests: write # allows SonarCloud to decorate PRs with analysis results

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Pinned checkout commit for this workflow (aligned with repo pattern)
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Analyze with SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        # Pinned SonarCloud scan action to resolve dependency vulnerabilities
        uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # nosemgrep: generic.secrets.security.detected-sonarqube-api-token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Additional arguments for the SonarScanner CLI
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          # When you need the analysis to take place in a directory other than the one from which it was launched, default is .
          projectBaseDir: .
