name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions: {}

jobs:
  jazzer:
    name: Jazzer.js Fuzzing
    runs-on: ubuntu-latest
    permissions:
      contents: read


    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install Jazzer.js
        run: npm install --no-save @jazzer.js/core

      - name: Run fuzz target (time-boxed)
        run: |
          npx jazzer fuzz/sanitize-input.fuzz.cjs \
            -- -max_total_time=30 -max_len=4096 -print_final_stats=1
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload fuzzing corpus
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzzing-corpus
          path: fuzz/corpus/
          retention-days: 30
          if-no-files-found: ignore
