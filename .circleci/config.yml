version: 2.1

orbs:
  node: circleci/node@7.2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:20.19.2@sha256:93d8e5b75c74e61b792ecdfe533c8a6b1d7367317430fa7ba84909cb0191b099
    resource_class: medium

jobs:
  install:
    executor: node-executor
    environment:
      # Skip browser download in the install job; e2e uses the Playwright Docker
      # image which already has browsers bundled.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  lint:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Format check
          command: npm run format:check

  typecheck:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: TypeScript type check
          command: npx tsc -b --noEmit

  # Runs the full test suite once, producing both JUnit results (for CircleCI
  # timing-based splitting in future runs) and a complete coverage report.
  # Running tests and coverage together avoids executing the suite twice, which
  # was the previous design's main drawback (parallel test job + separate
  # coverage job = 5x redundant test work per pipeline).
  test:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Test and coverage
          # set +e so the job doesn't abort on test failure; the exit code is
          # saved and re-raised after artifact upload so JUnit + coverage HTML
          # are preserved even when tests fail.
          command: |
            mkdir -p test-results
            set +e
            npm run test:coverage -- --run
            echo $? > /tmp/test-exit-code
          environment:
            CI: "true"
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results
      - store_artifacts:
          path: coverage
          destination: coverage
      - run:
          name: Report test status
          when: always
          command: exit $(cat /tmp/test-exit-code 2>/dev/null || echo 1)

  build:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: dist
          destination: dist

  e2e:
    docker:
      # Pinned to digest for reproducible, secure builds (avoids mutable-tag risk).
      # Tag: v1.59.1-noble
      - image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:eac9b0a5312cdab40ee8c2429df5bf19bffdccf8f3bf3c42268e173f97541645
    resource_class: medium
    steps:
      - checkout
      # Cache node_modules keyed by package-lock.json so re-installs are fast.
      # Uses a separate cache from the node-executor jobs because this image
      # may have a different ABI for native modules (e.g. sharp).
      - restore_cache:
          keys:
            - playwright-node-modules-v1-{{ checksum "package-lock.json" }}
            - playwright-node-modules-v1-
      # Attach the workspace to a temporary location so this job can copy the
      # built dist/ output without reusing node_modules created in a different
      # Docker image. Playwright browsers are pre-installed in the Docker image.
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Prepare E2E workspace
          command: |
            cp -R /tmp/workspace/dist ./dist
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
      - save_cache:
          key: playwright-node-modules-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Start preview server
          # background: true keeps the process alive across subsequent steps.
          # Using & within a step would terminate the server when the step exits.
          command: npm run preview -- --host 0.0.0.0 --port 4173
          background: true
      - run:
          name: Wait for preview server
          command: npx wait-on http://127.0.0.1:4173 --timeout 30000
      - run:
          name: E2E tests
          # set +e so the job doesn't abort on test failure; the exit code is
          # saved and re-raised after artifact upload.
          command: |
            set +e
            npm run test:e2e
            echo $? > /tmp/e2e-exit-code
          environment:
            CI: "true"
            BASE_URL: "http://127.0.0.1:4173"
      - store_test_results:
          # JUnit XML is written by the junit reporter added to playwright.config.ts
          path: test-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - run:
          name: Report E2E test status
          when: always
          command: exit $(cat /tmp/e2e-exit-code 2>/dev/null || echo 1)

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires:
            - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install
      - build:
          requires:
            - lint
            - typecheck
            - test
      - e2e:
          requires:
            - build
