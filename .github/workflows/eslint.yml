# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 15 * * 2'

# Using 'pull_request' (not 'pull_request_target') means this workflow runs in
# a restricted context where untrusted fork code has no access to secrets.
# Adding security-events:write here is safe: it only allows writing to the
# Security tab and does not elevate code execution privileges.
permissions:
  contents: read
  security-events: write
  actions: read # required for github/codeql-action/upload-sarif on private repositories

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install SARIF formatter
        run: npm install --no-save @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        id: eslint-run
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          set +e
          npx eslint "src/**/*.{js,jsx,ts,tsx}" \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif \
            --max-warnings 0
          ESLINT_EXIT_CODE=$?
          echo "exit_code=${ESLINT_EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Ensure SARIF file exists
        if: always()
        # Exit code semantics:
        #   0  – no findings; synthesize a minimal SARIF if ESLint didn't write one.
        #   1  – lint findings present; ESLint should have written real output, do nothing.
        #   >1 – ESLint crashed / misconfigured; re-exit with that code to fail the job
        #        rather than uploading a misleading zero-result SARIF.
        env:
          ESLINT_EXIT_CODE: ${{ steps.eslint-run.outputs.exit_code }}
        run: |
          # Default to 0 when the eslint-run step was skipped and produced no output.
          ESLINT_EXIT_CODE="${ESLINT_EXIT_CODE:-0}"
          if [ -n "${ESLINT_EXIT_CODE}" ] && [ "${ESLINT_EXIT_CODE}" -gt 1 ]; then
            echo "ESLint exited with code ${ESLINT_EXIT_CODE} (configuration or runtime error)."
            exit "${ESLINT_EXIT_CODE}"
          fi
          if [ -n "${ESLINT_EXIT_CODE}" ] && [ "${ESLINT_EXIT_CODE}" -eq 0 ] && [ ! -f eslint-results.sarif ]; then
            cat > eslint-results.sarif << 'EOF'
            {
              "version": "2.1.0",
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "ESLint",
                      "informationUri": "https://eslint.org",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }
          EOF
          fi

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        # Forked PRs run with reduced permissions and cannot write to the Security tab;
        # swallow the error there but let it fail loudly on main pushes and scheduled runs.
        continue-on-error: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
        with:
          sarif_file: eslint-results.sarif
          category: eslint
          wait-for-processing: true

      - name: ESLint Summary
        if: always()
        run: |
          echo "## 🔍 ESLint Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.eslint-run.outputs.exit_code }}" == "0" ]; then
            echo "✅ **ESLint:** No issues found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **ESLint:** Issues detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the **Security** tab for detailed findings." >> $GITHUB_STEP_SUMMARY
          fi
