---
# Coverage configuration for Codacy
coverage:
  # Coverage report paths
  paths:
    - coverage/lcov.info

  # Coverage thresholds
  thresholds:
    overall: 70
    file: 70

engines:
  # --- Enabled engines (well under the 20-run SARIF limit) ---
  semgrep:
    enabled: true
  # eslint-9: authoritative ESLint engine — uses eslint.config.js (flat config, ESLint 9+).
  eslint-9:
    enabled: true
  # eslint (legacy, ESLint 7 + @typescript-eslint v4): disabled to prevent duplicate analysis
  eslint:
    enabled: false
  lizard:
    enabled: true
    exclude_paths:
      - '**/*.test.tsx'
      - '**/*.test.ts'
      - '**/*.spec.tsx'
      - '**/*.spec.ts'
      - 'scripts/maintenance/**'
      - '.github/workflows/**'
  # --- Disabled engines ---
  csslint:
    enabled: false
  stylelint:
    enabled: false
  jshint:
    enabled: false
  tslint:
    enabled: false
  trivy:
    enabled: false
  checkov:
    enabled: false
  hadolint:
    enabled: false
  shellcheck:
    enabled: true
  markdownlint:
    enabled: false
  pmd-legacy:
    enabled: false

# Exclude specific patterns
exclude_patterns:
  - identifier: "generic.secrets.security.detected-sonarqube-api-token"
    paths:
      - ".github/workflows/sonarcloud.yml"
  - identifier: "Security/detect-non-literal-regexp"
    paths:
      - "src/utils/validation-utils.test.ts"
  - identifier: "python.linting.bandit.security.B603"
    paths:
      - "scripts/maintenance/utils.py"

# Exclude paths from code analysis
exclude_paths:
  - 'node_modules/**'
  - 'dist/**'
  - 'coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - 'src/test/**'
  - 'scripts/**'
  - '**/*.min.js'
  - 'docs/**'
