name: Dependency Check
on: [push]
permissions:
  contents: read
jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        with:
          project: 'paperlyte-v2'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired
