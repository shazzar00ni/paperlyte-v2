name: Daily PR Audit Summary

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-pr-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: '3.x'

      - name: Run PR Audit
        id: run_audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate audit results JSON
          python3 scripts/maintenance/audit_branches.py > audit_results.json

          # Generate markdown and comment on PRs using dedicated script
          python3 scripts/maintenance/generate_audit_summary.py

          # Prepend daily summary after the header in PR_REVIEW_SUMMARY.md
          if [ -f daily_summary.txt ]; then
            # Find the line number of the main header
            if [ ! -f PR_REVIEW_SUMMARY.md ]; then echo "# PR Review Summary

This file contains a summary of pull requests I have reviewed.
" > PR_REVIEW_SUMMARY.md; fi
            TODAY_HEADER="## $(date -u +%Y-%m-%d)"
            if grep -Fqx "$TODAY_HEADER" PR_REVIEW_SUMMARY.md; then
              echo "Summary for $TODAY_HEADER already exists; skipping prepend."
            else
              HEADER_LINE=$(grep -n "# PR Review Summary" PR_REVIEW_SUMMARY.md | head -n 1 | cut -d: -f1)
              if [ -z "$HEADER_LINE" ]; then
                HEADER_LINE=1
              fi
              AFTER_HEADER=$(($HEADER_LINE + 1))

              # Split the file around the main header to insert the new entry
              head -n $AFTER_HEADER PR_REVIEW_SUMMARY.md > top.md
              tail -n +$(($AFTER_HEADER + 1)) PR_REVIEW_SUMMARY.md > bottom.md

              # Combine and clean up
              cat top.md daily_summary.txt bottom.md > updated_summary.md
              mv updated_summary.md PR_REVIEW_SUMMARY.md
              rm top.md bottom.md
            fi
            rm -f daily_summary.txt audit_results.json
          fi

      - name: Commit and Push Changes
        run: |
          REPORT_BRANCH="daily-pr-audit-summary"

          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B "$REPORT_BRANCH"
          git add PR_REVIEW_SUMMARY.md

          if git commit -m "docs: automated daily PR audit summary ($(date +%Y-%m-%d))"; then
            git push --force-with-lease origin "$REPORT_BRANCH"
          else
            echo "No changes to commit"
          fi
