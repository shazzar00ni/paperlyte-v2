version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:22.18.0
    resource_class: medium
  node-executor-large:
    docker:
      - image: cimg/node:22.18.0
    resource_class: large

jobs:
  install:
    executor: node-executor
    environment:
      # Skip browser download in the install job; e2e uses the Playwright Docker
      # image which already has browsers bundled.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-npm-cache-v1-{{ checksum "package-lock.json" }}
            - node-npm-cache-v1-
      - run:
          name: Install dependencies
          command: npm ci
          no_output_timeout: 10m
      - save_cache:
          key: node-npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  lint:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Format check
          command: npm run format:check

  typecheck:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: TypeScript type check
          # Use the workspace-installed binary directly to avoid npx overhead.
          command: ./node_modules/.bin/tsc -b --noEmit

  # Runs the unit test suite via CircleCI Smarter Testing.
  # - Dynamic test splitting: tests are distributed across parallel nodes via a
  #   shared queue (dynamic_batching) so all nodes stay busy regardless of
  #   per-file runtime variance.
  # - Adaptive testing: once the coverage map is populated (requires the
  #   @circleci/vitest-circleci-coverage plugin and the analysis command in
  #   .circleci/test-suites.yml), only tests impacted by the current diff run.
  # - JUnit results are stored so CircleCI Insights can track test health.
  test:
    executor: node-executor
    parallelism: 2
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Run tests (Smarter Testing)
          # set +e so the job doesn't abort on test failure; the exit code is
          # saved and re-raised after artifact upload so JUnit results are
          # preserved even when tests fail.
          command: |
            mkdir -p test-results
            set +e
            circleci run testsuite "unit-tests"
            echo $? > /tmp/test-exit-code
          environment:
            CI: "true"
            # On CircleCI medium (4 GB), Node.js defaults to a ~1.5 GB heap
            # limit.  With fileParallelism: false, jsdom environments still
            # run serially but the heap ceiling can still be hit on slower
            # runs.  3 GB leaves ~1 GB headroom for the Vitest process, OS,
            # and Docker overhead.
            NODE_OPTIONS: "--max-old-space-size=3072"
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results
      - run:
          name: Report test status
          when: always
          command: exit $(cat /tmp/test-exit-code 2>/dev/null || echo 1)

  build:
    executor: node-executor-large
    steps:
      - checkout
      - attach_workspace:
          at: .
      # Hash all source files consumed by generate:icons and generate:mockups so
      # the generated assets (PNG/WebP/AVIF variants) are cached independently of
      # the main source build.  The combined fingerprint invalidates when any
      # source SVG or generation script changes.
      - run:
          name: Fingerprint asset generation sources
          command: |
            cat public/favicon.svg \
                scripts/generate-icons.js \
                scripts/generate-mockups.js \
                scripts/path-utils.js \
                public/mockups/note-detail.svg \
                public/mockups/notes-list.svg \
                > /tmp/asset-sources-fingerprint
      - restore_cache:
          keys:
            - generated-assets-v1-{{ checksum "/tmp/asset-sources-fingerprint" }}
      - run:
          name: Generate icons and mockups
          # Skip generation when all outputs are present (cache hit); regenerate
          # on first run or whenever any source file changes (cache miss).
          command: |
            if [ ! -f public/favicon-16x16.png ]; then
              npm run generate:icons && npm run generate:mockups
            else
              echo "Using cached generated assets — skipping generation"
            fi
      - save_cache:
          key: generated-assets-v1-{{ checksum "/tmp/asset-sources-fingerprint" }}
          paths:
            - public/favicon.ico
            - public/favicon-16x16.png
            - public/favicon-32x32.png
            - public/apple-touch-icon.png
            - public/android-chrome-192x192.png
            - public/android-chrome-192x192.webp
            - public/android-chrome-192x192.avif
            - public/android-chrome-512x512.png
            - public/android-chrome-512x512.webp
            - public/android-chrome-512x512.avif
            - public/mockups
      # Run the core build steps directly (bypassing npm pre/postbuild hooks which
      # have already been handled above and below) so each step is independently
      # timed and surfaced in CircleCI's step output.
      - run:
          name: TypeScript compile and Vite bundle
          command: |
            ./node_modules/.bin/tsc -b && \
            ./node_modules/.bin/vite build && \
            node scripts/inject-dates.js
          no_output_timeout: 12m
      - run:
          name: Generate sitemap
          command: node scripts/generate-sitemap.cjs
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: dist
          destination: dist

  e2e:
    docker:
      # Pinned to digest for reproducible, secure builds (avoids mutable-tag risk).
      # Tag: v1.59.1-noble (omitted from reference — CircleCI task-agent rejects tag+digest combos)
      - image: mcr.microsoft.com/playwright@sha256:eac9b0a5312cdab40ee8c2429df5bf19bffdccf8f3bf3c42268e173f97541645
    resource_class: medium
    steps:
      - checkout
      # Cache the npm registry cache (~/.npm) so npm ci can resolve packages
      # from disk rather than the network. node_modules itself is NOT cached
      # because npm ci always deletes and rebuilds it.
      - restore_cache:
          keys:
            - playwright-npm-cache-v1-{{ checksum "package-lock.json" }}
            - playwright-npm-cache-v1-
      # Attach the workspace to a temporary location so this job can copy the
      # built dist/ output without reusing node_modules created in a different
      # Docker image. Playwright browsers are pre-installed in the Docker image.
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Prepare E2E workspace
          command: |
            cp -R /tmp/workspace/dist ./dist
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci
      - save_cache:
          key: playwright-npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Start preview server
          # Use `serve` (static file server) rather than `npm run preview` (Vite).
          # Vite 8 requires Node >=20.19.0 but the Playwright Docker image ships
          # an older Node LTS; `serve` has no such constraint and avoids the need
          # to upgrade Node.js at runtime (which would require a curl|bash pipe).
          command: npx --yes serve dist --single -p 4173
          background: true
      - run:
          name: Wait for preview server
          command: npx wait-on http://127.0.0.1:4173 --timeout 30000
      - run:
          name: E2E tests
          # set +e so the job doesn't abort on test failure; the exit code is
          # saved and re-raised after artifact upload.
          command: |
            mkdir -p test-results
            set +e
            npm run test:e2e
            echo $? > /tmp/e2e-exit-code
          environment:
            CI: "true"
            BASE_URL: "http://127.0.0.1:4173"
          no_output_timeout: 8m
      - store_test_results:
          # JUnit XML is written by the junit reporter added to playwright.config.ts
          path: test-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - run:
          name: Report E2E test status
          when: always
          command: exit $(cat /tmp/e2e-exit-code 2>/dev/null || echo 1)

workflows:
  ci:
    # Production deploys intentionally remain in .github/workflows/deploy.yml.
    # That workflow enforces the security gate, protected production
    # environment approval, and production-deploy concurrency controls.
    jobs:
      - install
      - lint:
          requires:
            - install
      - typecheck:
          requires:
            - install
      - test:
          requires:
            - install
      - build:
          requires:
            - lint
            - typecheck
            - test
      - e2e:
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - /claude\/.*/
