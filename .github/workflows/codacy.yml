# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '19 22 * * 5'

permissions: {}

jobs:
  codacy-security-scan:
    # Runs on push to main and the weekly schedule only.
    # Pull requests are handled by codacy-pr-review (upload mode) instead,
    # avoiding a double analysis run per PR.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Execute Codacy Analysis CLI and generate a SARIF output with the security issues identified during the analysis.
      # upload: "false" prevents the action from auto-uploading the raw SARIF to Codacy at this point.
      # Codacy rejects uploads containing more than 20 runs; the raw output typically contains one run per
      # tool (23+). We merge all runs into one below and upload the merged file instead.
      #
      # project-token is intentionally omitted here. When project-token is provided the CLI downloads
      # the server-side tool configuration which currently has Trivy enabled. The Trivy Docker image
      # bundled by Codacy now outputs CycloneDX SBOM format; Codacy's own plugin parser expects the old
      # security-findings JSON format (with a "filename" field) and fails with a JsResultException.
      # Running without project-token forces the CLI to use the local .codacy.yml where
      # trivy: enabled: false is set, preventing the parse error. Results are still uploaded to Codacy
      # via the upload-sarif-to-codacy.sh step below.
      - name: Run Codacy Analysis CLI
        id: codacy-run
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08  # v4.4.7
        with:
          output: results.sarif
          format: sarif
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647
          # Disable auto-upload: the raw SARIF contains >20 runs and Codacy rejects it.
          # The merged single-run file is uploaded in the step below instead.
          upload: "false"

      # Merge multiple SARIF runs into a single run to stay within GitHub Code Scanning's
      # 20-run limit per SARIF upload. Codacy generates one run per tool (23 tools = 23 runs).
      # We must merge before uploading, and only upload when merge succeeds.
      # See: https://github.blog/changelog/2025-07-21-code-scanning-will-stop-combining-multiple-sarif-runs-uploaded-in-the-same-sarif-file/
      - name: Merge SARIF runs into single run
        id: merge-sarif
        if: steps.codacy-run.conclusion == 'success'
        run: bash ./scripts/merge-sarif-runs.sh results.sarif

      # Upload the merged single-run SARIF to Codacy.
      # This replaces the auto-upload that was disabled above, ensuring Codacy receives results
      # while staying within its 20-run-per-upload limit.
      # Shared with codacy-pr-review via scripts/upload-sarif-to-codacy.sh.
      - name: Upload merged SARIF to Codacy
        if: steps.merge-sarif.conclusion == 'success'
        continue-on-error: true
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          COMMIT_UUID: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash ./scripts/upload-sarif-to-codacy.sh results.sarif

      # Upload the SARIF file only after successful merge.
      # Using step outcome instead of hashFiles() ensures we never upload the
      # raw 23-run file when the merge step fails or is skipped.
      - name: Upload SARIF results file
        id: upload-sarif
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: steps.merge-sarif.conclusion == 'success'
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: codacy

      - name: Codacy Security Summary
        if: always()
        run: |
          echo "## 🔒 Codacy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.codacy-run.outcome }}" == "success" ]; then
            echo "✅ **Codacy Analysis:** Completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Codacy Analysis:** Issues detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.upload-sarif.outcome }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📄 SARIF results uploaded to GitHub Code Scanning." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.upload-sarif.outcome }}" == "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **SARIF upload failed.** Check the upload step logs for details." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge-sarif.conclusion }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **SARIF upload skipped** – merge step did not succeed." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed security findings in the **Security** tab." >> $GITHUB_STEP_SUMMARY

  codacy-pr-review:
    # Runs only on non-fork pull requests. Analyzes the PR and uploads results to
    # the Codacy platform so it can post inline PR review comments.
    # Mirrors the codacy-security-scan structure: the analysis step runs fail-fast
    # (a genuine analysis crash or config error fails this check), while ONLY the
    # upload to Codacy is fault-tolerant — a transient "Read timed out" talking to
    # api.codacy.com must not block the PR. This keeps flaky connectivity from
    # blocking PRs without letting a broken analysis silently pass review.
    # Skipped on fork PRs because CODACY_PROJECT_TOKEN is not available there.
    # The Codacy GitHub App posts comments via its own installation token, so
    # pull-requests: write on GITHUB_TOKEN is not needed here.
    name: Codacy PR Review
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Run analysis and generate SARIF. upload:false keeps this step fail-fast:
      # a genuine analysis failure (action crash, invalid config) fails the job,
      # so the PR-review path can't silently stop producing results. Transient
      # upload flakiness is tolerated separately in the upload step below.
      #
      # project-token is intentionally omitted: when it is present the CLI downloads
      # Codacy's server-side tool config (Trivy enabled) and Codacy's Trivy Docker
      # image now emits CycloneDX SBOM format instead of the expected security-findings
      # JSON, causing a JsResultException parse error. Without project-token the CLI
      # uses the local .codacy.yml (trivy: enabled: false). Results are still uploaded
      # to Codacy via the curl step below, enabling inline PR review comments.
      - name: Run Codacy Analysis CLI
        id: codacy-run
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08  # v4.4.7
        with:
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          # Force 0 exit code on findings; PR gating is handled by Codacy, not by
          # failing this step. Genuine tool/config errors still fail the step.
          max-allowed-issues: 2147483647
          # Upload is performed by the fault-tolerant curl step below, not here.
          upload: "false"

      # Merge multiple SARIF runs into a single run. Codacy emits one run per tool
      # and the upload endpoint rejects more than 20 runs. Gated on analysis success.
      - name: Merge SARIF runs into single run
        id: merge-sarif
        if: steps.codacy-run.conclusion == 'success'
        run: bash ./scripts/merge-sarif-runs.sh results.sarif

      # Upload the merged SARIF to Codacy so it can post inline PR review comments.
      # continue-on-error: ONLY transient upload connectivity issues are tolerated
      # here — the analysis step above already failed the job on real errors.
      # Shared with codacy-security-scan via scripts/upload-sarif-to-codacy.sh.
      - name: Upload SARIF to Codacy
        if: steps.merge-sarif.conclusion == 'success'
        continue-on-error: true
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          COMMIT_UUID: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash ./scripts/upload-sarif-to-codacy.sh results.sarif
