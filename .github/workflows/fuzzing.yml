name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions: {}

jobs:
  fuzz:
    name: Hand-rolled Node.js Fuzzing
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Compile validation module for fuzzing
        run: |
          node_modules/.bin/esbuild src/utils/validation.ts \
            --bundle --platform=node --format=cjs \
            --outfile=fuzz/validation.cjs

      - name: Run fuzz target (time-boxed)
        run: node fuzz/sanitize-input.fuzz.cjs
        timeout-minutes: 5
        env:
          FUZZ_ITERATIONS: '50000'
