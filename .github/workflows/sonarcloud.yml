name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:
  Analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # allows SonarCloud to decorate PRs with analysis results

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Check SonarCloud configuration
        id: check-sonar
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || \
             [ -z "${{ vars.SONAR_PROJECT_KEY }}" ] || \
             [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::SonarCloud secrets/variables not configured. Skipping analysis."
            echo "Required: SONAR_TOKEN (secret), SONAR_PROJECT_KEY (var), SONAR_ORGANIZATION (var)"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Analyze with SonarCloud
        if: steps.check-sonar.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          projectBaseDir: .
