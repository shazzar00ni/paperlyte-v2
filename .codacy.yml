---
# Coverage configuration for Codacy
coverage:
  paths:
    - coverage/lcov.info
  thresholds:
    overall: 70
    file: 70

engines:
  semgrep:
    enabled: true
  eslint-9:
    enabled: true
  eslint:
    enabled: false
  lizard:
    enabled: true
  csslint:
    enabled: false
  stylelint:
    enabled: false
  shellcheck:
    enabled: true

exclude_patterns:
  - identifier: "Security/detect-non-literal-regexp"
    paths:
      - "src/utils/validation-utils.test.ts"
  - identifier: "generic.secrets.security.detected-sonarqube-api-token"
    paths:
      - ".github/workflows/*.yml"
  - identifier: "generic.secrets.security.detected-sonarqube-api-key"
    paths:
      - ".github/workflows/*.yml"
  - identifier: "generic.secrets.security.detected-sonarqube-token"
    paths:
      - ".github/workflows/*.yml"

exclude_paths:
  - 'node_modules/**'
  - 'dist/**'
  - 'coverage/**'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - 'src/test/**'
  - 'scripts/maintenance/**'
  - '**/*.min.js'
