name: Create PR for ESLint v10 Follow-up Issue

on:
  push:
    branches:
      - claude/eslint-10-upgrade-issue-Bg8XP

permissions:
  pull-requests: write
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_BODY_B64: ""
        run: |
          TITLE="chore: open follow-up issue to track ESLint v10 upgrade (#525)"

          EXISTING=$(gh pr list --repo "$GH_REPO" --state open --json title,number \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping."
            exit 0
          fi

          echo "$PR_BODY_B64" | base64 -d > /tmp/pr-body.md

          gh pr create \
            --repo "$GH_REPO" \
            --base main \
            --head claude/eslint-10-upgrade-issue-Bg8XP \
            --title "$TITLE" \
            --body-file /tmp/pr-body.md
