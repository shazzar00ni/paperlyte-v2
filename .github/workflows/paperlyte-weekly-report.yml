name: Weekly Paperlyte Activity Report

on:
  schedule:
    - cron: "0 0 * * MON"   # every Monday at 00:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  build-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install Python deps
        run: pip install requests==2.32.4 pandas==2.2.3

      - name: Generate weekly report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<EOF
          import requests, pandas as pd, datetime as dt
          import os

          # Settings
          owner = "shazzar00ni"
          repos = ["paperlyte", "paperlyte-v2"]
          since = (dt.datetime.utcnow() - dt.timedelta(days=7)).isoformat() + "Z"

          rows = []

          def add(type, title, date, host):
              rows.append([type, title, date, host])

          for repo in repos:
              api = f"https://api.github.com/repos/{owner}/{repo}"

              # Issues & PRs
              issues = requests.get(
                  f"{api}/issues?since={since}&state=all",
                  headers={"Authorization": f"token {os.environ['GH_TOKEN']}"}
              ).json()

              for i in issues:
                  title = i.get("title")
                  date = i.get("updated_at")
                  is_pr = "pull_request" in i
                  add("Pull Request" if is_pr else "Issue", title, date, "github.com")

              # Commits
              commits = requests.get(
                  f"{api}/commits?since={since}",
                  headers={"Authorization": f"token {os.environ['GH_TOKEN']}"}
              ).json()

              for c in commits:
                  title = c["commit"]["message"].split("\n")[0]
                  date = c["commit"]["author"]["date"]
                  add("Commit", title, date, "github.com")

              # Releases
              releases = requests.get(
                  f"{api}/releases",
                  headers={"Authorization": f"token {os.environ['GH_TOKEN']}"}
              ).json()

              for r in releases:
                  date = r.get("published_at")
                  if date and date > since:
                      add("Release", r.get("name") or r.get("tag_name"), date, "github.com")

          df = pd.DataFrame(rows, columns=["Type","Title","Last Visited","Host"])

          folder = "reports/weekly"
          os.makedirs(folder, exist_ok=True)
          filename = f"{folder}/week-{dt.datetime.utcnow().date()}-paperlyte-activity.csv"
          df.to_csv(filename, index=False)

          print("Generated:", filename)
          EOF

      - name: Commit report
        id: commit
        run: |
          git config user.name "Paperlyte Bot"
          git config user.email "actions@github.com"
          git add reports/weekly/*.csv
          if git commit -m "Weekly Paperlyte activity report"; then
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger CI for coverage upload
        # GITHUB_TOKEN pushes don't trigger other workflows, so Codacy never receives
        # coverage data for bot commits — causing "not up to standards" on PRs that
        # use this commit as the ancestor. repository_dispatch IS permitted from
        # GITHUB_TOKEN (unlike push) and only requires contents: write, which this
        # job already holds. CI listens for the run-ci event type and runs tests +
        # uploads coverage for this commit.
        # Only dispatches when a report commit was actually created; skips no-change weeks.
        # SHA is passed via client_payload so CI checks out the exact bot commit rather
        # than racing onto a newer default-branch HEAD.
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          echo "Dispatching CI workflow via repository_dispatch for commit ${COMMIT_SHA}"
          gh api "repos/${REPO}/dispatches" \
            -f event_type=run-ci \
            -f "client_payload[sha]=${COMMIT_SHA}"
